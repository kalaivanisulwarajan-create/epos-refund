<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Error — EPOS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif; background: #f0f4f8;
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 24px;
    }
    .card {
      background: #fff; border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.10);
      max-width: 480px; width: 100%; overflow: hidden;
    }
    .header { background: #1a3c6e; padding: 28px 36px; color: #fff; }
    .header h1 { font-size: 20px; }
    .body { padding: 32px 36px; text-align: center; }
    .icon {
      width: 56px; height: 56px; background: #fee2e2; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; font-size: 26px;
    }
    h2 { color: #991b1b; font-size: 18px; margin-bottom: 10px; }
    p  { color: #555; font-size: 14px; line-height: 1.6; }
    .footer {
      background: #f5f5f5; padding: 14px 36px;
      font-size: 11px; color: #aaa; text-align: center;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="header"><h1>EPOS Refund Management</h1></div>
  <div class="body">
    <div class="icon">🚫</div>
    <h2>Something went wrong</h2>
    <p>{{ message }}</p>
    <p style="margin-top:12px; font-size:12px; color:#aaa;">
      If this keeps happening, contact your system administrator.
    </p>
  </div>
  <div class="footer">EPOS Now (Singapore) Pte Ltd — Refund Management System</div>
</div>
</body>
</html>
